baseURL: "https://diegostrebel.com"
title: Diego Strebel
pagination.pagerSize: 10
theme: PaperMod

outputs:
  home:
    - HTML
    - RSS
    - JSON # This is the critical line for search

copyright: 'This work is licensed under <a href="https://creativecommons.org/licenses/by-sa/4.0/">CC BY-SA 4.0</a> <img src="https://mirrors.creativecommons.org/presskit/icons/cc.svg" alt="CC" style="height: 1em; margin-left: .3em; vertical-align: middle; display: inline-block;"><img src="https://mirrors.creativecommons.org/presskit/icons/by.svg" alt="BY" style="height: 1em; margin-left: .1em; vertical-align: middle; display: inline-block;"><img src="https://mirrors.creativecommons.org/presskit/icons/sa.svg" alt="SA" style="height: 1em; margin-left: .1em; vertical-align: middle; display: inline-block;">'
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

taxonomies:
  category: categories
  tag: tags

params:
  
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: Diego Strebel
  description: "A Tech Blog"
  keywords: [Blog, Portfolio, PaperMod, Homelab, Hardware, Mersenne Primes]
  author: Diego Strebel
  # author: ["Me", "You"] # multiple authors
  images: ["<link or path of image for opengraph, twitter-cards>"]
  DateFormat: "2 January 2006"
  defaultTheme: auto # dark, light
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: true
  showtoc: true
  tocopen: false

  assets:
    # disableHLJS: true # to disable highlight.js
    # disableFingerprinting: true
    favicon: "favicon.ico"
    favicon16x16: "favicon-16x16.png"
    favicon32x32: "favicon-32x32.png"
    apple_touch_icon: "apple-touch-icon.png"
  label:
    text: "Diego Strebel"
    icon: /r9290small.jpg # https://www.flickr.com/photos/130561288@N04/43859958584/
    iconHeight: 35

  # profile-mode
  profileMode:
    enabled: false # needs to be explicitly set
    title: ExampleSite
    subtitle: "This is subtitle"
    imageUrl: "<img location>"
    imageWidth: 120
    imageHeight: 120
    imageTitle: my image
    buttons:
      - name: Posts
        url: posts
      - name: Tags
        url: tags

  # home-info mode
  homeInfoParams:
    Title: "Hello World!"
    Content: A blog of all posts that do not contain themselves

  socialIcons:
    - name: github
      url: "https://github.com/dstremur"
    - name: linkedin
      url: "https://www.linkedin.com/in/diego-strebel-a4558b3b6/"

  analytics:
    google:
      SiteVerificationTag: "kfcfPE9a1B70m1l45PL6d1bP3O6QGtALh1QpuPPe_04"
    bing:
      SiteVerificationTag: "XYZabc"
    yandex:
      SiteVerificationTag: "XYZabc"

  cover:
    hidden: true # hide everywhere but not in structured data
    hiddenInList: true # hide on list pages and home
    hiddenInSingle: true # hide on single page

  editPost:
    URL: "https://github.com/dstremur/streblog/tree/main/content"
    Text: "Suggest Changes" # edit text
    appendFilePath: true # to append file path to Edit link

  # for search
  # https://fusejs.io/api/options.html
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.2
    minMatchCharLength: 0
    #limit: 10 # refer: https://www.fusejs.io/api/methods.html#search
    keys: ["title", "permalink", "summary", "content"]
menu:
  main:
    - identifier: about
      name: about 
      url: /about/
      weight: 10
    - identifier: categories
      name: categories
      url: /categories/
      weight: 20
    - identifier: tags
      name: tags
      url: /tags/
      weight: 30
    - identifier: archive
      name: archive
      url: /archives/ 
      weight: 40
    - identifier: search
      name: search
      url: /search/
      weight: 50
# Read: https://github.com/adityatelange/hugo-PaperMod/wiki/FAQs#using-hugos-syntax-highlighter-chroma
pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    anchorLineNos: false
    # codeFences: true
    # guessSyntax: true
    lineNos: false
    style: github
  goldmark:
    renderer:
      unsafe: true
